# Builds website/ (the loopy docs site, Astro + Starlight) and publishes it to
# GitHub Pages. This workflow is intentionally NOT active yet: it will only run
# once GitHub Pages is enabled for this repository (Settings → Pages → Source:
# GitHub Actions) — until then, pushes to master simply won't trigger a
# deployment because there's no Pages environment for `deploy-pages` to target.
# Enabling Pages is a deliberate follow-up left for a maintainer, not done here.
name: Deploy docs

on:
  push:
    branches: [master]
    paths:
      - "website/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
